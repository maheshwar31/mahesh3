<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEC Student Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#003366,#007bff);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    width:360px;
    background:#fff;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.logo{
    width:100px;
    height:100px;
    object-fit:contain;
    margin-bottom:15px;
}

h2{
    color:#003366;
    margin-bottom:5px;
}

p{
    color:#666;
    margin-bottom:20px;
    font-size:14px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    background:#003366;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    transition:.3s;
}

button:hover{
    background:#0056b3;
}

.footer{
    margin-top:20px;
    font-size:13px;
    color:#777;
}
</style>

</head>
<body>

<div class="login-box">

    <!-- College Logo -->
    <img src="1697346843915.jpeg" alt="College Logo" class="logo">

    <h2>APEC Student Login</h2>
    <p>Assignment 10 - GitHub Pages Hosting</p>

    <form>
        <input type="text" placeholder="Register Number" required>

        <input type="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <div class="footer">
        © 2026 APEC Student Portal
    </div>

</div>

</body>
</html>
